<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مأموریت جغد دانا</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

<header>
<h1>🦉 مأموریت جغد دانا</h1>
<h2>👩‍🏫 آموزگار: پونه سلامی</h2>
<p>فارسی ششم دبستان - درس اول</p>
</header>

<section id="startPage">
<div class="owl">🦉</div>

<input
id="playerName"
type="text"
placeholder="نام دانش‌آموز">

<button id="startBtn">
شروع بازی
</button>
</section>

<section id="quizPage" class="hide">

<div class="topBar">

<div>
⭐ <span id="score">0</span>
</div>

<div>
❤️ <span id="life">3</span>
</div>

</div>

<div class="progress">
<div id="bar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="message"></div>

</section>

<section id="finishPage" class="hide">

<h1>🏆 پایان بازی</h1>

<p id="result"></p>

<button onclick="location.reload()">
بازی دوباره
</button>

</section>

</div>

<script src="questions.js"></script>
<script src="game.js"></script>

</body>
</html>
